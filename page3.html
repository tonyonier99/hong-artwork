<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>online material</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #ffffff;
      --text: #222;
      --text-muted: #888;
      --accent: #333;
      --border: #e0e0e0;
      --light-bg: #f8f8f8;
    }

    html,
    body {
      height: 100%;
      font-size: 16px;
    }

    body {
      font-family: 'Helvetica', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .page-wrapper {
      width: 100vw;
      height: 100vh;
      padding: 32px 36px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: stretch;
    }

    .video-section {
      position: relative;
      overflow: hidden;
      background: var(--light-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .video-section video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--light-bg);
    }

    .content-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 16px;
      overflow-y: auto;
    }

    .artwork-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .artwork-description {
      font-size: 0.92rem;
      font-weight: 300;
      line-height: 2;
    }

    @media (max-width: 800px) {
      body {
        overflow: auto;
      }

      .page-wrapper {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
        padding: 20px;
        gap: 24px;
      }

      .video-section {
        aspect-ratio: 16/9;
      }

      .content-section {
        padding: 16px 0 40px;
      }

      .artwork-title {
        font-size: 1.25rem;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .video-section {
      animation: fadeIn 0.6s ease 0.1s both;
    }

    .content-section {
      animation: fadeIn 0.6s ease 0.25s both;
    }
  </style>
</head>

<body>

  <main class="page-wrapper">
    <div class="video-section">
      <video controls playsinline preload="metadata">
        <source src="video.mp4" type="video/mp4">
        您的瀏覽器不支援影片播放。
      </video>
    </div>

    <div class="content-section">
      <!-- ★ 替換標題與描述 -->
      <h1 class="artwork-title">作品名稱</h1>
      <div class="artwork-description">
        <p>在此填入作品的文字描述。</p>
      </div>
    </div>
  </main>

</body>

</html>
